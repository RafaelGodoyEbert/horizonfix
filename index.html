<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Horizonte Fixo | ULTRA v4.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css?v=4.0">

    <!-- Video Duration Fixer -->
    <script src="https://cdn.jsdelivr.net/npm/webm-duration-fix@1.0.4/lib/index.js"></script>
</head>

<body>

    <video id="video-source" playsinline autoplay muted></video>
    <canvas id="viewfinder"></canvas>

    <div id="ui-layer">
        <div id="focus-point" class="focus-point"></div>
        <div class="top-bar">
            <div class="status-badge">
                <div class="indicator-dot" id="sensor-dot"></div>
                <span id="angle-text">0.0°</span>
            </div>

            <!-- DEBUG INFO -->
            <div style="font-size: 9px; color: #0f0; background: rgba(0,0,0,0.6); padding: 5px; position: absolute; left: 10px; top: 10px; z-index: 1000; pointer-events: none; border-radius: 4px;"
                id="debug-info">
                ULTRA v4.0 Caching...
            </div>
            <!-- CAM DEBUG INFO -->
            <div style="font-size: 9px; color: #ff0; background: rgba(0,0,0,0.6); padding: 5px; position: absolute; left: 10px; top: 40px; z-index: 1000; pointer-events: none; border-radius: 4px;"
                id="cam-debug-info">
                Cam Check...
            </div>

            <div style="display: flex; gap: 10px;">
                <!-- Aspect Ratio Toggle -->
                <button id="btn-aspect-toggle"
                    style="width: 48px; height: 48px; border-radius: 50%; background: rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; cursor: pointer; pointer-events: auto; color: white; transition: all 0.2s;">
                    <div style="display: flex; flex-direction: column; align-items: center;">
                        <span id="aspect-label" style="font-size: 8px; font-weight: bold;">16:9</span>
                        <div id="aspect-icon" style="width: 14px; height: 10px; border: 1.5px solid white; margin-top: 2px;"></div>
                    </div>
                </button>

                <!-- Camera Switch -->
                <button id="btn-flip-camera"
                    style="width: 48px; height: 48px; border-radius: 50%; background: rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; cursor: pointer; pointer-events: auto;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12A9 9 0 0 0 6 5.3L3 8" />
                        <path d="M3 12a9 9 0 0 0 15 6.7l3-2.7" />
                    </svg>
                </button>
            </div>
        </div>

        <div class="recording-time" id="recording-time">
            <div class="indicator-dot-recording"></div>
            <span id="time-display">00:00</span>
        </div>

        <div class="leveler-container" id="leveler">
            <div class="leveler-line-horizontal"></div>
            <div class="leveler-line-vertical"></div>
            <div class="horizon-line" id="horizon-line"></div>
        </div>

        <div id="focus-square"></div>

        <button id="settings-toggle">⚙️</button>

        <div class="controls-panel" id="controls-panel">
            <div class="control-card">
                <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                    <div class="control-label">Zoom Digital</div>
                    <div class="control-value" id="zoom-val">1.0x</div>
                </div>
                <input type="range" id="zoom-slider" min="0.5" max="3.0" step="0.1" value="1.0">
            </div>

            <!-- Shutter -->
            <div class="control-card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <div class="control-label">Shutter Speed</div>
                    <label class="switch">
                        <input type="checkbox" id="shutter-toggle">
                        <span class="slider"></span>
                    </label>
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div class="control-value" id="shutter-val">Auto</div>
                    <input type="range" id="shutter-slider" min="1" max="1000" step="1" value="120" disabled style="width: 60%;">
                </div>
            </div>

            <!-- ISO -->
            <div class="control-card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <div class="control-label">ISO</div>
                    <label class="switch">
                        <input type="checkbox" id="iso-toggle">
                        <span class="slider"></span>
                    </label>
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div class="control-value" id="iso-val">Auto</div>
                    <input type="range" id="iso-slider" min="50" max="3200" step="10" value="800" disabled style="width: 60%;">
                </div>
            </div>

            <!-- Horizon Lock -->
            <div class="control-card" style="display: flex; justify-content: space-between; align-items: center;">
                <div class="control-label">Horizon Lock (v4.0)</div>
                <label class="switch">
                    <input type="checkbox" id="horizon-toggle" checked>
                    <span class="slider"></span>
                </label>
            </div>

            <!-- Hardware OIS -->
            <div class="control-card" style="display: flex; justify-content: space-between; align-items: center;">
                <div class="control-label">OIS Mecânico</div>
                <label class="switch">
                    <input type="checkbox" id="ois-toggle">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div class="bottom-controls">
            <button class="btn-record" id="btn-record">
                <div class="record-inner"></div>
            </button>
        </div>
    </div>

    <!-- Initialization Screen -->
    <div class="overlay-start" id="start-overlay">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="url(#gradient)" stroke-width="1.5" style="margin-bottom: 20px;">
            <defs>
                <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#00f2fe" />
                    <stop offset="100%" stop-color="#4facfe" />
                </linearGradient>
            </defs>
            <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z" />
            <circle cx="12" cy="13" r="3" />
        </svg>

        <h1>Horizonte Fixo v4.0</h1>
        <p class="desc">Replicação da funcionalidade de estabilização extrema de vídeo em tempo real no navegador.</p>

        <button class="btn-primary" id="btn-start">
            Ativar Sistema (v4.0)
        </button>
    </div>

    <script src="js/app.js?v=4.0"></script>
    <script src="js/ui.js?v=4.0"></script>
    <script src="js/sensors.js?v=4.0"></script>
    <script src="js/focus.js?v=4.0"></script>
    <script src="js/camera.js?v=4.0"></script>
    <script src="js/recording.js?v=4.0"></script>
    <script src="js/renderer.js?v=4.0"></script>
</body>

</html>
